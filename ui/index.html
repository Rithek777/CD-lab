<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Flang Allocation Profiler</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace" aria-label="Profiler workspace">
        <div class="topbar">
          <div>
            <p class="eyebrow">HLFIR/FIR allocation analysis</p>
            <h1>Flang Implicit Allocation Profiler</h1>
          </div>
          <div class="status" id="runStatus">Ready</div>
        </div>

        <div class="controls">
          <label>
            Sample
            <select id="sampleSelect"></select>
          </label>
          <label>
            Format
            <select id="formatSelect">
              <option value="json">JSON + visual summary</option>
              <option value="text">Text report</option>
            </select>
          </label>
          <label>
            Threshold MB
            <input id="thresholdInput" type="number" min="0" step="0.1" value="0" />
          </label>
          <label class="toggle">
            <input id="showIrInput" type="checkbox" />
            <span>Show IR</span>
          </label>
          <button id="loadSampleButton" type="button">Load Sample</button>
          <button id="analyzeButton" type="button">Analyze</button>
        </div>

        <div class="panes">
          <section class="editorPane" aria-label="MLIR input">
            <div class="paneHeader">
              <h2>Input MLIR</h2>
              <span id="inputMeta">0 lines</span>
            </div>
            <textarea id="mlirInput" spellcheck="false"></textarea>
          </section>

          <section class="resultPane" aria-label="Analysis results">
            <div class="paneHeader">
              <h2>Report</h2>
              <span id="reportMeta">No run yet</span>
            </div>
            <div class="metrics" id="metrics"></div>
            <div class="allocations" id="allocations"></div>
            <pre class="rawReport" id="rawReport"></pre>
          </section>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
